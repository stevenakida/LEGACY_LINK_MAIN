<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sign In - LegacyLink Africa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, #070b14 0%, #0b1220 55%, #0d1730 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom));
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: rgba(17, 24, 39, 0.8);
            border: 2px solid #26334D;
            border-radius: 15px;
            padding: 32px 40px 40px;
            text-align: center;
        }
        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }
        .logo img {
            height: 160px;
            width: auto;
            max-width: 100%;
        }
        .subtitle {
            color: #E8A63C;
            margin-bottom: 24px;
            font-size: 1.1em;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ffffff;
            font-weight: 500;
            font-size: 0.95em;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #26334D;
            border-radius: 8px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            transition: all 0.3s ease;
        }
        input::placeholder {
            color: #64748B;
        }
        input:focus {
            outline: none;
            border-color: #E8A63C;
            background: rgba(255, 255, 255, 0.1);
        }
        button {
            background: #E8A63C;
            color: #0B1220;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        button:hover {
            background: #F2C368;
            transform: translateY(-2px);
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: #94A3B8;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #26334D;
        }
        .divider span {
            padding: 0 10px;
            font-size: 0.9em;
        }
        .social-login {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px;
            border: 2px solid #26334D;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #ffffff;
        }
        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        .google-btn {
            background: #ffffff;
            color: #0B1220;
            border-color: #ffffff;
        }
        .google-btn:hover {
            background: #f5f5f5;
        }
        .google-btn i {
            color: #EA4335;
        }
        .facebook-btn {
            background: #1877F2;
            border-color: #1877F2;
            color: #ffffff;
        }
        .facebook-btn:hover {
            background: #166FE5;
        }
        .links {
            margin-top: 25px;
            font-size: 14px;
        }
        .links a {
            color: #E8A63C;
            text-decoration: none;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .error {
            background: rgba(239, 68, 68, 0.2);
            color: #FCA5A5;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #F87171;
            text-align: left;
        }
        .success {
            background: rgba(16, 185, 129, 0.2);
            color: #A7F3D0;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #10B981;
            text-align: left;
        }
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            .logo {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><img src="{% static 'img/legacy-logo.png' %}" alt="LegacyLink Africa Logo"></div>
        <div class="subtitle">Sign In to Your Account</div>
        {% if messages %}
            {% for message in messages %}
                <div class="{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Phone or Email</label>
                <input type="text" name="username" id="id_username" placeholder="Enter your phone or email" required>
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" placeholder="Enter your password" required>
            </div>
            <button type="submit">SIGN IN</button>
        </form>
        <div class="links">
            <a href="/register/">Create Account</a>
        </div>

        <div class="divider"><span>OR</span></div>

        <div class="social-login">
            <button type="button" class="social-btn google-btn" onclick="alert('Social login is coming soon! Please use email/password for now.')">
                <i class="fab fa-google"></i>
                <span>Continue with Google</span>
            </button>
        </div>
    </div>
</body>
</html>
