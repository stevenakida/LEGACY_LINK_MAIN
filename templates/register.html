<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - LegacyLink Africa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a4a 0%, #2c3e5a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: rgba(30, 45, 74, 0.8);
            border: 2px solid #3d5a7f;
            border-radius: 15px;
            padding: 50px 40px;
            text-align: center;
        }
        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }
        .logo img {
            height: 220px;
            width: auto;
            max-width: 100%;
        }
        .subtitle {
            color: #d4af37;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ffffff;
            font-weight: 500;
            font-size: 0.95em;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #3d5a7f;
            border-radius: 8px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            transition: all 0.3s ease;
        }
        input::placeholder {
            color: #708aa0;
        }
        input:focus {
            outline: none;
            border-color: #d4af37;
            background: rgba(255, 255, 255, 0.1);
        }
        button {
            background: #d4af37;
            color: #1a2a4a;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        button:hover {
            background: #e5c158;
            transform: translateY(-2px);
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: #a0a0a0;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #3d5a7f;
        }
        .divider span {
            padding: 0 10px;
            font-size: 0.9em;
        }
        .social-login {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px;
            border: 2px solid #3d5a7f;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #ffffff;
        }
        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        .google-btn {
            background: #ffffff;
            color: #1a2a4a;
            border-color: #ffffff;
        }
        .google-btn:hover {
            background: #f5f5f5;
        }
        .google-btn i {
            color: #EA4335;
        }
        .facebook-btn {
            background: #1877F2;
            border-color: #1877F2;
            color: #ffffff;
        }
        .facebook-btn:hover {
            background: #166FE5;
        }
        .links {
            margin-top: 25px;
            font-size: 14px;
        }
        .links a {
            color: #d4af37;
            text-decoration: none;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .error {
            background: rgba(255, 100, 100, 0.2);
            color: #ff9999;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #ff6666;
            text-align: left;
        }
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            .logo {
                font-size: 1.5em;
            }
        }
        .form-message {
    margin-bottom: 15px;
    padding: 12px 14px;
    border-radius: 10px;
    font-weight: 600;
}

.form-message.error {
    background: #ffe4e6;
    color: #9f1239;
    border: 1px solid #fda4af;
}

.form-message.success {
    background: #dcfce7;
    color: #166534;
    border: 1px solid #86efac;
}
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><img src="{% static 'img/legacy-logo.png' %}" alt="LegacyLink Africa Logo"></div>
        <div class="subtitle">Create a New Account</div>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

    <form method="post" action="{% url 'register' %}">
    {% csrf_token %}

 <label for="full_name">Full Name</label>
<input type="text" id="full_name" name="full_name" placeholder="Enter full name" required>

<label for="phone_or_email">Phone or Email</label>
<input type="text" id="phone_or_email" name="phone_or_email" placeholder="Enter phone or email" required>

<label for="password">Password</label>
<input type="password" id="password" name="password" placeholder="Enter password" required>

    <button type="submit">Create Account</button>
</form>
{% if messages %}
    {% for message in messages %}
        <div class="form-message {{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
        <div class="links">
            <a href="/">Back to Home</a> | <a href="/login/">Sign In</a>
        </div>
        
        <div class="divider"><span>OR</span></div>
        
        <div class="social-login">
            <button type="button" class="social-btn google-btn" onclick="alert('Social login is coming soon! Please use email/password for now.')">
                <i class="fab fa-google"></i>
                <span>Sign up with Google</span>
            </button>
            <button type="button" class="social-btn facebook-btn" onclick="alert('Social login is coming soon! Please use email/password for now.')">
                <i class="fab fa-facebook-f"></i>
                <span>Sign up with Facebook</span>
            </button>
        </div>
    </div>
</body>
</html>
