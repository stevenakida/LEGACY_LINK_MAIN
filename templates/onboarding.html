<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet"
>
    <title>Onboarding - LegacyLink Africa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, #070b14 0%, #0b1220 55%, #0d1730 100%);
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: calc(1rem + env(safe-area-inset-top)) 1rem calc(1rem + env(safe-area-inset-bottom));
            overflow-x: hidden;
        }
        
        .container {
            max-width: 600px;
            width: 90%;
            background: rgba(17, 24, 39, 0.8);
            border: 2px solid #26334D;
            border-radius: 15px;
            padding: 2rem;
        }
        
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .header h1 {
            color: #E8A63C;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        
        .header p {
            color: #94A3B8;
            font-size: 0.95rem;
        }
        
        form {
            display: flex;
            flex-direction: column;
        }
        
        label {
            color: #E8A63C;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        
        select, input {
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #26334D;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        select option {
            color: #000000;
            background-color: #ffffff;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #E8A63C;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(232, 166, 60, 0.2);
    
        }
        
        button {
            margin-top: 2rem;
            padding: 0.75rem;
            background: #E8A63C;
            color: #0B1220;
            border: 2px solid #E8A63C;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        button:hover {
            background: #F2C368;
            border-color: #F2C368;
            transform: translateY(-2px);
        }
        
        .messages {
            list-style: none;
            margin-top: 1.5rem;
        }
        
        .messages li {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            background: rgba(16, 185, 129, 0.2);
            border-left: 4px solid #10B981;
            color: #ffffff;
        }
        
        .messages li.error {
            background: rgba(239, 68, 68, 0.2);
            border-left-color: #EF4444;
        }.material-symbols-rounded {
    font-family: 'Material Symbols Rounded';
    font-weight: normal;
    font-style: normal;
    font-size: 1.25rem;
    line-height: 1;
    letter-spacing: normal;
    text-transform: none;
    display: inline-block;
    white-space: nowrap;
    word-wrap: normal;
    direction: ltr;
    -webkit-font-feature-settings: 'liga';
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'liga';

    font-variation-settings:
        'FILL' 1,
        'wght' 500,
        'GRAD' 0,
        'opsz' 24;
}

.nav-icon {
    font-size: 1.45rem;
}

.header-actions a,
.header-actions button,
.brand .action-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.45rem;
}

.logout-form {
    margin: 0;
}

.logout-form button {
    font: inherit;
}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Complete Onboarding</h1>
            <p>Verify your school and graduation year to unlock your alumni network</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <label for="id_school">Select Your School</label>
            <select name="school" id="id_school" required>
                <option value="">-- Choose your school --</option>
                {% for school in schools %}
                    <option value="{{ school.id }}">{{ school.name }} ({{ school.region }})</option>
                {% endfor %}
            </select>
            
            <label for="id_graduation_year">Graduation Year</label>
            <input type="number" name="graduation_year" id="id_graduation_year" min="1950" max="2030" placeholder="e.g., 2020" required>
            
            <button type="submit">Complete Onboarding</button>
        </form>
        
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    </div>
</body>
</html>
