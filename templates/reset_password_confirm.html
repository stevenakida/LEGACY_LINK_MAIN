<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Reset Password - LegacyLink Africa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, #070b14 0%, #0b1220 55%, #0d1730 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom));
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: rgba(17, 24, 39, 0.8);
            border: 2px solid #26334D;
            border-radius: 15px;
            padding: 32px 40px 40px;
            text-align: center;
        }
        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }
        .logo img {
            height: 160px;
            width: auto;
            max-width: 100%;
        }
        .subtitle {
            color: #E8A63C;
            margin-bottom: 24px;
            font-size: 1.1em;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ffffff;
            font-weight: 500;
            font-size: 0.95em;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #26334D;
            border-radius: 8px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            transition: all 0.3s ease;
        }
        input::placeholder {
            color: #64748B;
        }
        input:focus {
            outline: none;
            border-color: #E8A63C;
            background: rgba(255, 255, 255, 0.1);
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 45px;
        }
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            padding: 6px;
            color: #64748B;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
        }
        .toggle-password:hover {
            color: #E8A63C;
        }
        button[type="submit"] {
            background: #E8A63C;
            color: #0B1220;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 5px;
        }
        button[type="submit"]:hover {
            background: #F2C368;
            transform: translateY(-2px);
        }
        .links {
            margin-top: 25px;
            font-size: 14px;
        }
        .links a {
            color: #E8A63C;
            text-decoration: none;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .error {
            background: rgba(239, 68, 68, 0.2);
            color: #FCA5A5;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #F87171;
            text-align: left;
        }
        .success {
            background: rgba(16, 185, 129, 0.2);
            color: #A7F3D0;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #10B981;
            text-align: left;
        }
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><img src="{% static 'img/legacy-logo.png' %}" alt="LegacyLink Africa Logo"></div>
        <div class="subtitle">Set a New Password</div>
        {% if messages %}
            {% for message in messages %}
                <div class="{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'reset_password_confirm' uidb64=uidb64 token=token %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_password">New Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="id_password" placeholder="Enter new password" required>
                    <button type="button" class="toggle-password" data-target="id_password" aria-label="Show password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="id_confirm_password">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" name="confirm_password" id="id_confirm_password" placeholder="Re-enter new password" required>
                    <button type="button" class="toggle-password" data-target="id_confirm_password" aria-label="Show password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit">RESET PASSWORD</button>
        </form>
        <div class="links">
            <a href="/login/">Back to Sign In</a>
        </div>
    </div>

    <script>
        document.querySelectorAll('.toggle-password').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var input = document.getElementById(btn.dataset.target);
                var icon = btn.querySelector('i');
                var showing = input.type === 'text';
                input.type = showing ? 'password' : 'text';
                icon.classList.toggle('fa-eye', showing);
                icon.classList.toggle('fa-eye-slash', !showing);
                btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
            });
        });
    </script>
</body>
</html>
