<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Forgot Password - LegacyLink Africa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, #070b14 0%, #0b1220 55%, #0d1730 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom));
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: rgba(17, 24, 39, 0.8);
            border: 2px solid #26334D;
            border-radius: 15px;
            padding: 32px 40px 40px;
            text-align: center;
        }
        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }
        .logo img {
            height: 160px;
            width: auto;
            max-width: 100%;
        }
        .subtitle {
            color: #E8A63C;
            margin-bottom: 12px;
            font-size: 1.1em;
        }
        .help-text {
            color: #94A3B8;
            font-size: 0.9em;
            line-height: 1.6;
            margin-bottom: 24px;
            text-align: left;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ffffff;
            font-weight: 500;
            font-size: 0.95em;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #26334D;
            border-radius: 8px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            transition: all 0.3s ease;
        }
        input::placeholder {
            color: #64748B;
        }
        input:focus {
            outline: none;
            border-color: #E8A63C;
            background: rgba(255, 255, 255, 0.1);
        }
        button {
            background: #E8A63C;
            color: #0B1220;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 5px;
        }
        button:hover {
            background: #F2C368;
            transform: translateY(-2px);
        }
        .links {
            margin-top: 25px;
            font-size: 14px;
        }
        .links a {
            color: #E8A63C;
            text-decoration: none;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .error {
            background: rgba(239, 68, 68, 0.2);
            color: #FCA5A5;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #F87171;
            text-align: left;
        }
        .success {
            background: rgba(16, 185, 129, 0.2);
            color: #A7F3D0;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #10B981;
            text-align: left;
        }
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><img src="{% static 'img/legacy-logo.png' %}" alt="LegacyLink Africa Logo"></div>
        <div class="subtitle">Forgot Your Password?</div>
        <p class="help-text">Enter the email address on your account and we'll send you a link to reset your password.</p>
        {% if messages %}
            {% for message in messages %}
                <div class="{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'forgot_password' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_email">Email</label>
                <input type="text" name="email" id="id_email" placeholder="Enter your email" required>
            </div>
            <button type="submit">SEND RESET LINK</button>
        </form>
        <div class="links">
            <a href="/login/">Back to Sign In</a>
        </div>
    </div>
</body>
</html>
